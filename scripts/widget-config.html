<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: "Segoe UI", Helvetica Neue, sans-serif; }
        select, input[type="number"] {
            border: 1px solid #8a8886;
            border-radius: 2px;
            background: #ffffff;
            outline: none;
        }
        select:focus, input[type="number"]:focus, input[type="text"]:focus {
            border-color: #0078d4;
        }
    </style>
    <link rel="stylesheet" href="vssui.css" />
</head>
<body>
    <div id="widget-root"></div>
    <script src="react.js"></script>
    <script src="vssui.js"></script>
    <script src="tfsapi.js"></script>
    <script src="WidgetConfig.js"></script>
</body>
</html>
